steps:
  # Step 1: Build the container using Buildpacks
  - name: 'gcr.io/k8s-skaffold/pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/gemini-fastapi-service'
      - '--builder'
      - 'gcr.io/buildpacks/builder:v1'
      - '--network'
      - 'cloudbuild'

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gemini-fastapi-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gemini-fastapi-service'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/gemini-fastapi-service'

options:
  logging: CLOUD_LOGGING_ONLY